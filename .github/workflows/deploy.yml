name: Build and Deploy to EKS

# Run only when commits land on main. Pull requests do not deploy.
on:
  push:
    branches: [main]

# id-token: write is required for the OIDC token exchange with AWS.
# contents: read lets the workflow check out the repository.
permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Build, push, and deploy
    runs-on: ubuntu-24.04

    env:
      RELEASE_NAME: aws-eks-pipeline
      CHART_PATH: ./helm

    steps:
      # 1. Pull the repo so we can build the image and read the Helm chart.
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Exchange the GitHub OIDC token for short-lived AWS credentials.
      #    The IAM role to assume and the target region come from repo secrets,
      #    so no long-lived AWS keys are stored in GitHub.
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      # 3. Authenticate the Docker daemon to the ECR registry that the
      #    repository URL points at.
      - name: Log in to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      # 4. Build the application image from app/ and tag it with the commit
      #    SHA so every deploy is uniquely identifiable. Also push the image
      #    here in the same step.
      - name: Build and push Docker image
        id: build
        env:
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t "$ECR_REPOSITORY:$IMAGE_TAG" ./app
          docker push "$ECR_REPOSITORY:$IMAGE_TAG"
          echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"

      # 5. Install kubectl so the runner can talk to the EKS API server.
      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.30.0

      # 6. Install Helm for the chart upgrade.
      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.15.0

      # 7. Write a kubeconfig pointing at the target EKS cluster, using the
      #    AWS credentials obtained via OIDC above.
      - name: Update kubeconfig for EKS
        run: |
          aws eks update-kubeconfig \
            --name "${{ secrets.EKS_CLUSTER_NAME }}" \
            --region "${{ secrets.AWS_REGION }}"

      # 8. Deploy the chart, overriding image.repository and image.tag so the
      #    cluster pulls the exact image we just pushed. --install makes this
      #    idempotent: it creates the release on first run and upgrades it
      #    every subsequent run.
      - name: Deploy to EKS via Helm
        env:
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ steps.build.outputs.image_tag }}
        run: |
          helm upgrade --install "$RELEASE_NAME" "$CHART_PATH" \
            --set image.repository="$ECR_REPOSITORY" \
            --set image.tag="$IMAGE_TAG" \
            --wait \
            --timeout 5m
